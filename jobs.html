<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="description" content="東江泉 天然飲用泉水 - 職位空缺"/>
  <title>職位空缺 | 東江泉 天然飲用泉水</title>
  <link rel="shortcut icon" href="assets/images/logo.png"/>
  <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<header id="top" class="site-header"></header>

<main id="wrap">

  <!-- Jobs Topbar -->
  <div class="jobs-topbar">
    <div class="container">
      <div class="jobs-topbar-inner">
        <span class="jobs-title">我們的工作機會</span>
        <div class="jobs-search">
          <div class="search-input-wrap">
            <input type="search" placeholder="搜尋⋯" class="jobs-search-input"/>
            <button class="jobs-search-btn"><i class="fa fa-search"></i></button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Jobs Grid -->
  <div class="container jobs-container">
    <div class="jobs-grid">
      <div class="jobs-empty text-center">
        <p class="jobs-empty-text">
          目前沒有空缺的工作機會，<br/>
          但歡迎隨時<strong>聯絡我們</strong>自薦。
        </p>
        <img src="assets/images/job_not_found.svg" alt="找不到相關職位" class="jobs-empty-img" style="width:50%;max-width:400px;"/>
        <p class="mt-3">
          <a href="contactus.html" class="btn-contact">聯絡我們自薦</a>
        </p>
      </div>
    </div>
  </div>

</main>

<footer id="bottom"></footer>
<script src="main.js"></script>
</body>
</html>
